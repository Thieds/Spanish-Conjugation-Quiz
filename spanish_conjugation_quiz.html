<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#bf4b2b">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Conjugación">
<title>Spanish Conjugation Drill</title>
<style>
:root{--bg:#fafaf7;--card:#fff;--ink:#1a1a18;--mut:#6f6f68;--line:#e7e4dc;--acc:#bf4b2b;--accbg:#fbeee8;
--ok:#1d7a52;--okbg:#e7f5ee;--no:#b23b3b;--nobg:#fbecec;--chip:#eef1f6}
@media(prefers-color-scheme:dark){:root{--bg:#15151a;--card:#202027;--ink:#ededf1;--mut:#9b9ba4;--line:#34343e;
--acc:#e2876a;--accbg:#3a201a;--ok:#57c897;--okbg:#13301f;--no:#e3736f;--nobg:#3a1d1d;--chip:#272730}}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.top h1{font-size:17px;font-weight:600;margin:0}
.top .stat{font-size:13px;color:var(--mut)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
.scr{display:none}.scr.on{display:block}
h2{font-size:15px;font-weight:600;margin:2px 0 10px}
.lab{font-size:13px;color:var(--mut);margin:14px 0 8px;letter-spacing:.02em;text-transform:uppercase}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:999px;
padding:9px 14px;font-size:14px;cursor:pointer;user-select:none}
.opt.sel{background:var(--accbg);border-color:var(--acc);color:var(--acc);font-weight:600}
.btn{width:100%;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:17px;font-weight:600;
padding:15px;cursor:pointer;margin-top:18px}
.btn.ghost{background:transparent;color:var(--acc);border:1px solid var(--line)}
.meta{font-size:12px;color:var(--mut);margin-top:14px;line-height:1.5}
.prog{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);margin-bottom:12px}
.prg{height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
.prg>i{display:block;height:100%;background:var(--acc);width:0;transition:width .25s}
.tgt{display:inline-block;font-size:12.5px;color:var(--acc);background:var(--accbg);
border-radius:8px;padding:4px 10px;margin-bottom:14px;font-weight:600}
.word{font-size:40px;font-weight:700;letter-spacing:-.01em}
.gloss{font-size:15px;color:var(--mut);margin:2px 0 2px}
.choice{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--card);
color:var(--ink);border-radius:13px;padding:15px 16px;font-size:21px;margin:9px 0;cursor:pointer;
transition:border-color .1s,background .1s}
.choice:active{transform:scale(.995)}
.choice.correct{border-color:var(--ok);background:var(--okbg);color:var(--ok)}
.choice.wrong{border-color:var(--no);background:var(--nobg);color:var(--no)}
.choice:disabled{cursor:default}
.fb{margin-top:14px;font-size:14px;line-height:1.6;display:none}
.fb.on{display:block}
.fb .tag{font-weight:600}
.fb .tag.ok{color:var(--ok)}.fb .tag.no{color:var(--no)}
.fb .why{margin-top:6px;padding:11px 13px;background:var(--chip);border-radius:10px;color:var(--ink)}
.fb .rule{margin-top:8px;color:var(--mut);font-size:13px}
.fb .para{margin-top:8px;font-size:14px;color:var(--ink);letter-spacing:.01em}
.fb .para b{color:var(--acc)}
.res .big{font-size:46px;font-weight:700;text-align:center;margin:6px 0}
.res .sub{text-align:center;color:var(--mut);font-size:14px;margin-bottom:8px}
.cell{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid var(--line)}
.cell b{font-weight:600}
.foot{margin-top:auto;padding-top:18px;text-align:center;font-size:11.5px;color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>Spanish Conjugation Drill</h1><div class="stat" id="lifetime"></div></div>

  <div id="home" class="scr on card">
    <h2>Build a session</h2>
    <div class="lab">Tense</div>
    <div class="opts" id="types"></div>
    <div class="lab">Verb type</div>
    <div class="opts" id="classes"></div>
    <div class="lab">Length</div>
    <div class="opts" id="lens"></div>
    <button class="btn" id="start">Start</button>
    <div class="meta" id="poolinfo"></div>
  </div>

  <div id="quiz" class="scr card">
    <div class="prog"><span id="qnum"></span><span id="qscore"></span></div>
    <div class="prg"><i id="bar"></i></div>
    <div class="tgt" id="tgt"></div>
    <div class="word" id="word"></div>
    <div class="gloss" id="gloss"></div>
    <div id="choices" style="margin-top:16px"></div>
    <div class="fb" id="fb"></div>
    <button class="btn" id="next" style="display:none">Next</button>
  </div>

  <div id="res" class="scr card res">
    <div class="big" id="rbig"></div>
    <div class="sub" id="rsub"></div>
    <div id="rcells"></div>
    <button class="btn" id="again">New session</button>
    <button class="btn ghost" id="retry" style="display:none">Retry the ones I missed</button>
  </div>

  <div class="foot" id="foot"></div>
</div>

const TYPE_LABEL={present:"Present",preterite:"Preterite"};
const CLS_LABEL={reg:"Regular",stem:"Stem-changing",irreg:"Irregular",orth:"Spelling-change"};
const CLASS_UI={ALL:"All",reg:"Regular",stem:"Stem-change",irreg:"Irregular",orth:"Spelling"};
const PORD=["yo","tu","el","nos","ellos"];
const PSHORT={yo:"yo",tu:"tú",el:"él",nos:"nos.",ellos:"ellos"};

function flat(){
  const out=[];
  BANK.items.forEach(it=>{
    it.questions.forEach(q=>{
      out.push({inf:it.inf,gloss:it.gloss,cls:it.cls,type:q.type,person:q.person,
        target:q.target,note:q.note,choices:q.choices,paradigm:it.forms[q.type]});
    });
  });
  return out;
}
const POOL=flat();

const KEY="esq_v1";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}}}
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){}}
let store=load();
if(!store.settings) store.settings={types:["present","preterite"],classes:["ALL"],len:15};
if(!store.life) store.life={seen:0,correct:0};
save(store);

const TYPES=["present","preterite"];
const CLASSES=["ALL","reg","stem","irreg","orth"];
const LENS=[10,15,25,50,0];

function chip(text,sel,on){const d=document.createElement("div");d.className="opt"+(sel?" sel":"");d.textContent=text;d.onclick=on;return d;}

function renderHome(){
  const ts=document.getElementById("types");ts.innerHTML="";
  TYPES.forEach(t=>ts.appendChild(chip(TYPE_LABEL[t],store.settings.types.includes(t),()=>{
    const a=store.settings.types,i=a.indexOf(t); if(i<0)a.push(t); else if(a.length>1)a.splice(i,1);
    save(store);renderHome();})));
  const cs=document.getElementById("classes");cs.innerHTML="";
  CLASSES.forEach(c=>cs.appendChild(chip(CLASS_UI[c],store.settings.classes.includes(c),()=>{
    let a=store.settings.classes;
    if(c==="ALL"){a=["ALL"];}
    else{a=a.filter(x=>x!=="ALL");const i=a.indexOf(c); if(i<0)a.push(c); else a.splice(i,1); if(!a.length)a=["ALL"];}
    store.settings.classes=a;save(store);renderHome();})));
  const ls=document.getElementById("lens");ls.innerHTML="";
  LENS.forEach(n=>ls.appendChild(chip(n===0?"All":(""+n),store.settings.len===n,()=>{
    store.settings.len=n;save(store);renderHome();})));
  const pc=poolCount();
  document.getElementById("poolinfo").textContent=pc+" questions match · "+BANK.meta.verbs+" verbs · "+BANK.meta.dialect;
  const L=store.life; document.getElementById("lifetime").textContent=L.seen?("lifetime "+Math.round(100*L.correct/L.seen)+"% · "+L.seen):"";
}
function matchSet(){
  const T=new Set(store.settings.types), C=store.settings.classes;
  return POOL.filter(q=>{
    if(!T.has(q.type))return false;
    if(C.includes("ALL"))return true;
    return C.includes(q.cls);
  });
}
function poolCount(){return matchSet().length;}

let sess=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function startSession(items){
  let pool=items||matchSet();
  if(!pool.length){alert("No questions match — pick at least one tense and verb type.");return;}
  pool=shuffle(pool);
  const n=store.settings.len; if(n>0)pool=pool.slice(0,n);
  sess={q:pool,i:0,score:0,miss:[],byCls:{},byType:{}};
  show("quiz");renderQ();
}
function renderQ(){
  const q=sess.q[sess.i];
  document.getElementById("qnum").textContent="Q "+(sess.i+1)+" / "+sess.q.length;
  document.getElementById("qscore").textContent=sess.score+" right";
  document.getElementById("bar").style.width=(100*sess.i/sess.q.length)+"%";
  document.getElementById("tgt").textContent=q.target;
  document.getElementById("word").textContent=q.inf;
  document.getElementById("gloss").textContent=q.gloss;
  document.getElementById("next").style.display="none";
  const ch=document.getElementById("choices");ch.innerHTML="";
  const fb=document.getElementById("fb");fb.className="fb";fb.innerHTML="";
  shuffle(q.choices).forEach(c=>{
    const b=document.createElement("button");b.className="choice";b.textContent=c.t;
    b.onclick=()=>pick(b,c,q);ch.appendChild(b);
  });
}
function paradigmHTML(q){
  return PORD.map(p=>{
    const v=q.paradigm[p]; const lab=PSHORT[p];
    return p===q.person ? ("<b>"+lab+" "+v+"</b>") : (lab+" "+v);
  }).join(" · ");
}
function pick(btn,choice,q){
  const ch=document.getElementById("choices");
  [...ch.children].forEach(b=>{b.disabled=true;
    const cc=q.choices.find(x=>x.t===b.textContent);
    if(cc&&cc.ok)b.classList.add("correct");
    else if(b===btn)b.classList.add("wrong");
  });
  const correct=q.choices.find(x=>x.ok);
  const ok=choice.ok;
  if(ok)sess.score++;
  store.life.seen++; if(ok)store.life.correct++; save(store);
  sess.byCls[q.cls]=sess.byCls[q.cls]||{c:0,s:0};sess.byCls[q.cls].s++;if(ok)sess.byCls[q.cls].c++;
  sess.byType[q.type]=sess.byType[q.type]||{c:0,s:0};sess.byType[q.type].s++;if(ok)sess.byType[q.type].c++;
  if(!ok)sess.miss.push(q);
  const fb=document.getElementById("fb");fb.className="fb on";
  let html="";
  if(ok){html+='<div class="tag ok">✓ Correct — '+correct.t+'</div>';
    html+='<div class="why">'+correct.why+'</div>';}
  else{html+='<div class="tag no">✗ Answer: '+correct.t+'</div>';
    html+='<div class="why"><b>'+choice.t+'</b> — '+choice.why+'</div>';
    html+='<div class="rule">✓ '+correct.t+': '+correct.why+'</div>';}
  html+='<div class="para">'+paradigmHTML(q)+'</div>';
  if(q.note)html+='<div class="rule">'+q.note+'</div>';
  fb.innerHTML=html;
  document.getElementById("next").style.display="block";
  document.getElementById("qscore").textContent=sess.score+" right";
}
document.getElementById("next").onclick=()=>{
  sess.i++;
  if(sess.i>=sess.q.length)finish();
  else renderQ();
};
function finish(){
  show("res");
  const pct=Math.round(100*sess.score/sess.q.length);
  document.getElementById("rbig").textContent=pct+"%";
  document.getElementById("rsub").textContent=sess.score+" / "+sess.q.length+" correct";
  const cells=document.getElementById("rcells");cells.innerHTML="";
  const rows=[];
  for(const k in sess.byType){const v=sess.byType[k];rows.push([TYPE_LABEL[k]||k,v.c,v.s]);}
  for(const k in sess.byCls){const v=sess.byCls[k];rows.push([CLS_LABEL[k]||k,v.c,v.s]);}
  rows.sort((a,b)=>(a[1]/a[2])-(b[1]/b[2]));
  rows.forEach(r=>{const d=document.createElement("div");d.className="cell";
    d.innerHTML="<span>"+r[0]+"</span><b>"+Math.round(100*r[1]/r[2])+"% <span style='color:var(--mut);font-weight:400'>("+r[1]+"/"+r[2]+")</span></b>";
    cells.appendChild(d);});
  document.getElementById("retry").style.display=sess.miss.length?"block":"none";
}
document.getElementById("start").onclick=()=>startSession();
document.getElementById("again").onclick=()=>{renderHome();show("home");};
document.getElementById("retry").onclick=()=>startSession(sess.miss);
function show(id){["home","quiz","res"].forEach(s=>document.getElementById(s).classList.toggle("on",s===id));}

document.getElementById("foot").textContent=BANK.meta.questions+" questions · generated "+BANK.meta.generated+" · forms engine-verified";
renderHome();

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('service-worker.js').catch(function(){});
  });
}
</script>
